services:
  mysql:
    image: mysql:8.4
    container_name: grocery-pos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: grocery_pos
      MYSQL_USER: grocery
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./apps/api/migrations/001_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./apps/api/seeds/001_demo.sql:/docker-entrypoint-initdb.d/02-demo.sql:ro

volumes:
  mysql-data:
